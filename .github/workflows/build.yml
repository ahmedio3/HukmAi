name: Build Debug APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'
      
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "9.3.1"
          cache-read-only: false
      
      - name: Verify database exists
        run: ls -lh app/src/main/assets/databases/feqhia.db
      
      - name: Set up .env with real API keys from GitHub Secrets
        env:
          MAIN_KEY: ${{ secrets.API_KEY_ROUTER_MAIN }}
          FALLBACK_KEY: ${{ secrets.API_KEY_ROUTER_FALLBACK }}
          ANSWER_KEY: ${{ secrets.API_KEY_ANSWER }}
        run: |
          python3 << 'PYEOF'
import os, re

with open('.env.example') as f:
    content = f.read()

replacements = [
    ('API_KEY_ROUTER_MAIN', os.environ.get('MAIN_KEY', '')),
    ('API_KEY_ROUTER_FALLBACK', os.environ.get('FALLBACK_KEY', '')),
    ('API_KEY_ANSWER', os.environ.get('ANSWER_KEY', '')),
]

for key, value in replacements:
    if value:  # non-empty value from GitHub Secret
        content = re.sub(
            rf'^{key}=.*',
            f'{key}={value}',
            content,
            flags=re.MULTILINE
        )

with open('.env', 'w') as f:
    f.write(content)

print('=== .env verification (keys hidden) ===')
for line in content.strip().split('\n'):
    if '=' in line and not line.startswith('#'):
        print(line.split('=')[0] + '=****')
PYEOF
      
      - name: Build with Gradle
        run: gradle assembleDebug --stacktrace --no-daemon
      
      - uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 7
