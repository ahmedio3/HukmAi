name: Build Debug APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'
      
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "9.3.1"
          cache-read-only: false
      
      - name: Verify database exists
        run: ls -lh app/src/main/assets/databases/feqhia.db
      
      - name: Set up .env with real API keys from GitHub Secrets
        env:
          MAIN_KEY: ${{ secrets.API_KEY_ROUTER_MAIN }}
          FALLBACK_KEY: ${{ secrets.API_KEY_ROUTER_FALLBACK }}
          ANSWER_KEY: ${{ secrets.API_KEY_ANSWER }}
        run: |
          python3 -c "
import os, re
c = open('.env.example').read()
for k, e in [('API_KEY_ROUTER_MAIN','MAIN_KEY'),('API_KEY_ROUTER_FALLBACK','FALLBACK_KEY'),('API_KEY_ANSWER','ANSWER_KEY')]:
    v = os.environ.get(e, '')
    if v:
        c = re.sub(r'^' + k + '=.*', k + '=' + v, c, flags=re.MULTILINE)
open('.env', 'w').write(c)
print('=== env verification ===')
for l in c.strip().split(chr(10)):
    if '=' in l and not l.startswith('#'):
        print(l.split('=')[0] + '=****')
"
      
      - name: Build with Gradle
        run: gradle assembleDebug --stacktrace --no-daemon
      
      - uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 7
