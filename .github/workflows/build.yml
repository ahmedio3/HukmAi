name: Build Release APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'
      
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "9.3.1"
          cache-read-only: false
      
      - name: Verify database exists
        run: ls -lh app/src/main/assets/databases/feqhia.db
      
      - name: Build release with Gradle
        env:
          API_KEY_ROUTER_MAIN: ${{ secrets.API_KEY_ROUTER_MAIN }}
          API_KEY_ROUTER_FALLBACK: ${{ secrets.API_KEY_ROUTER_FALLBACK }}
          API_KEY_ANSWER: ${{ secrets.API_KEY_ANSWER }}
        run: gradle assembleRelease --stacktrace --no-daemon
      
      - uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: app/build/outputs/apk/release/*.apk
          retention-days: 7
